<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="shields-panel loading">
    <div class="header">
      <div class="shield-icon" id="shieldIcon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L3 7v5c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5z" fill="currentColor"/>
        </svg>
      </div>
      <div class="header-text">
        <h1>Brave Shields</h1>
        <span id="hostname" class="hostname">—</span>
      </div>
      <label class="toggle">
        <input type="checkbox" id="shieldsToggle" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="status" id="statusText">Shields are UP</div>

    <div class="stats">
      <div class="stat-row">
        <span class="stat-label">Ads & trackers blocked</span>
        <span class="stat-value" id="adsBlocked">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Scripts blocked</span>
        <span class="stat-value" id="trackersBlocked">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Fingerprinting blocked</span>
        <span class="stat-value" id="fingerprintBlocked">0</span>
      </div>
    </div>

    <div class="controls">
      <div class="controls-header">Settings for this site</div>
      <div class="control-row">
        <span>Ad blocking</span>
        <select id="adBlockMode">
          <option value="standard">Standard</option>
          <option value="aggressive">Aggressive</option>
        </select>
      </div>
      <div class="control-row">
        <span>Cookie blocking</span>
        <select id="cookieBlocking">
          <option value="cross-site">Cross-site</option>
          <option value="all">All</option>
          <option value="none">None</option>
        </select>
      </div>
    </div>
  </div>
</body>
</html>
